<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio-Glow Pro</title>
    <style>
        :root { --accent: #00f2f7; --gold: #ffd700; --bg: #0a0a0c; --card: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* DASHBOARD */
        #dashboard { width: 100%; max-width: 400px; margin-bottom: 25px; }
        .countdown-card { background: linear-gradient(145deg, #1e293b, #0a0a0c); border-radius: 25px; padding: 25px; border: 1.5px solid var(--accent); text-align: center; box-shadow: 0 10px 30px rgba(0, 242, 247, 0.1); }
        .countdown-timer { font-size: 2.2rem; font-weight: 900; color: var(--accent); letter-spacing: -1px; margin-top: 5px; }
        .next-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 5px; }

        /* CALENDAR */
        #main-calendar { width: 100%; max-width: 400px; }
        .month-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.03); backdrop-filter: blur(10px); }
        .month-title { font-size: 1.4rem; font-weight: 800; color: var(--accent); margin-bottom: 15px; text-align: center; }
        .day-names { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; font-weight: bold; color: #555; font-size: 0.75rem; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 12px; background: rgba(255,255,255,0.02); font-size: 0.95rem; cursor: pointer; transition: 0.2s; position: relative; }
        .cell:active { transform: scale(0.9); background: var(--accent); color: black; }
        
        /* MARKS */
        .today-mark { background: white !important; color: black !important; font-weight: 900; box-shadow: 0 0 20px rgba(255,255,255,0.4); z-index: 2; }
        .holiday-mark { border: 1.5px solid var(--gold); color: var(--gold); font-weight: bold; }
        .event-mark { border: 1.5px solid var(--accent); background: rgba(0, 242, 247, 0.1); }
        .empty { visibility: hidden; }

        /* EVENT MANAGER */
        .event-manager { width: 100%; max-width: 400px; margin-top: 20px; padding-bottom: 50px; }
        .section-title { color: var(--accent); font-size: 1.2rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .event-item { background: var(--card); padding: 16px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--accent); animation: slideIn 0.3s ease-out; }
        .event-info b { display: block; font-size: 1.05rem; margin-bottom: 2px; }
        .event-info small { color: var(--accent); font-weight: 600; font-size: 0.85rem; display: block; }
        .del-btn { background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1.5px solid #ff4444; padding: 8px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }

        /* MODAL */
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(8px); }
        .modal-box { background: #16161a; padding: 35px; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; border: 1px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #333; background: #000; color: white; margin: 20px 0; outline: none; font-size: 1.1rem; box-sizing: border-box; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-row button { padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .active { display: flex !important; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <h1 style="color:var(--accent); margin-bottom: 20px; font-weight: 900; letter-spacing: -1px;">Ethio-Glow <span style="font-weight: 100; opacity: 0.5;">PRO</span></h1>

    <div id="dashboard">
        <div class="countdown-card">
            <div id="next-event-name" class="next-label">Scanning Calendar...</div>
            <div id="countdown-display" class="countdown-timer">00d 00h 00m</div>
        </div>
    </div>

    <div id="main-calendar"></div>

    <div class="event-manager">
        <div class="section-title"><span>📌</span> My Personal Events</div>
        <div id="my-event-list"></div>
    </div>

    <div id="modal">
        <div class="modal-box">
            <h2 id="m-title" style="color:var(--accent); margin:0;">Date</h2>
            <p id="h-info" style="color:var(--gold); font-size: 0.9rem; margin-top: 8px; font-weight: bold;"></p>
            <input type="text" id="m-input" placeholder="What's the plan?">
            <div class="btn-row">
                <button onclick="closeModal()" style="background:#222; color:white;">Cancel</button>
                <button id="m-save" style="background:var(--accent); color:black;">Save Event</button>
            </div>
        </div>
    </div>

    <script type="module">
        const amhMonths = ["መስከረም", "ጥቅምት", "ህዳር", "ታህሳስ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ", "ጳጉሜ"];
        const offsets = [4, 6, 1, 3, 5, 0, 2, 4, 6, 1, 3, 5, 0]; // 2018 (Meskerem 1 = Thursday)

        const holidays = [
            { name: "Enkutatash", m: "መስከረም", d: 1, idx: 0 },
            { name: "Meskel", m: "መስከረም", d: 17, idx: 0 },
            { name: "Genna", m: "ታህሳስ", d: 29, idx: 3 },
            { name: "Timkat", m: "ጥር", d: 11, idx: 4 },
            { name: "Adwa Victory", m: "የካቲት", d: 23, idx: 5 },
            { name: "Siklet", m: "ሚያዝያ", d: 10, idx: 7 },
            { name: "Fasika", m: "ሚያዝያ", d: 12, idx: 7 },
            { name: "Labor Day", m: "ግንቦት", d: 23, idx: 8 },
            { name: "Ginbot 20", m: "ግንቦት", d: 20, idx: 8 }
        ];

        let userEvents = JSON.parse(localStorage.getItem('ethio_glow_final_db') || '[]');
        let currentSelection = null;

        function refreshUI() {
            const now = Date.now();
            const startYear = new Date("2025-09-11").getTime();
            
            // 1. Generate/Refresh Calendar Grid
            generateCalendar(startYear);
            
            // 2. Calculate All Upcoming (Holidays + User)
            let allUpcoming = [];
            holidays.forEach(h => {
                const t = startYear + (((h.idx * 30) + (h.d - 1)) * 86400000);
                if (t > now) allUpcoming.push({ name: h.name, time: t, type: 'holiday' });
            });
            userEvents.forEach(e => {
                if (e.time > now) allUpcoming.push({ ...e, type: 'user' });
            });
            allUpcoming.sort((a, b) => a.time - b.time);

            // 3. Top Dashboard Update
            if (allUpcoming.length > 0) {
                const next = allUpcoming[0];
                document.getElementById('next-event-name').innerText = `Upcoming: ${next.name}`;
                const diff = next.time - now;
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                document.getElementById('countdown-display').innerText = `${d}d ${h}h ${m}m`;
            }

            // 4. Personal Event List Update
            const listWrap = document.getElementById('my-event-list');
            listWrap.innerHTML = userEvents.length ? "" : "<p style='color:#444; text-align:center;'>No upcoming personal events.</p>";

            userEvents.sort((a, b) => a.time - b.time).forEach(ev => {
                const diff = ev.time - now;
                if (diff > -86400000) { // Keep events visible for the day of
                    const d = Math.max(0, Math.floor(diff / 86400000));
                    const h = Math.max(0, Math.floor((diff % 86400000) / 3600000));
                    const m = Math.max(0, Math.floor((diff % 3600000) / 60000));
                    
                    listWrap.innerHTML += `
                        <div class="event-item">
                            <div class="event-info">
                                <b>${ev.note}</b>
                                <small>${ev.m} ${ev.d} • In ${d}d ${h}h ${m}m</small>
                            </div>
                            <button class="del-btn" onclick="window.deleteEvent(${ev.id})">Remove</button>
                        </div>`;
                }
            });
        }

        function generateCalendar(startYear) {
            const wrap = document.getElementById('main-calendar');
            wrap.innerHTML = "";
            const daysSinceStart = Math.floor((Date.now() - startYear) / 86400000);
            const curM = Math.floor(daysSinceStart / 30);
            const curD = (daysSinceStart % 30) + 1;

            amhMonths.forEach((name, idx) => {
                let html = `<div class="month-card"><div class="month-title">${name}</div><div class="day-names"><div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div></div><div class="grid">`;
                for (let e = 0; e < offsets[idx]; e++) html += `<div class="cell empty"></div>`;
                let monthLen = (idx === 12) ? 6 : 30;
                for (let i = 1; i <= monthLen; i++) {
                    const isToday = (idx === curM && i === curD);
                    const holiday = holidays.find(h => h.m === name && h.d === i);
                    const hasEvent = userEvents.some(e => e.m === name && e.d === i);
                    let cls = `cell ${isToday?'today-mark':''} ${holiday?'holiday-mark':''} ${hasEvent?'event-mark':''}`;
                    html += `<div class="${cls}" onclick="openModal('${name}', ${i}, '${holiday?holiday.name:''}', ${idx})">${i}</div>`;
                }
                wrap.innerHTML += html + `</div></div>`;
            });
        }

        window.openModal = (m, d, h, mIdx) => {
            currentSelection = { m, d, mIdx };
            document.getElementById('m-title').innerText = `${m} ${d}`;
            document.getElementById('h-info').innerText = h ? `🎊 ${h}` : "";
            const existing = userEvents.find(e => e.m === m && e.d === d);
            document.getElementById('m-input').value = existing ? existing.note : "";
            document.getElementById('modal').classList.add('active');
            setTimeout(() => document.getElementById('m-input').focus(), 100);
        };

        window.closeModal = () => document.getElementById('modal').classList.remove('active');

        document.getElementById('m-save').onclick = () => {
            const note = document.getElementById('m-input').value;
            userEvents = userEvents.filter(e => !(e.m === currentSelection.m && e.d === currentSelection.d));
            if (note.trim()) {
                const startYear = new Date("2025-09-11").getTime();
                const time = startYear + (((currentSelection.mIdx * 30) + (currentSelection.d - 1)) * 86400000);
                userEvents.push({ id: Date.now(), m: currentSelection.m, d: currentSelection.d, note, time });
            }
            localStorage.setItem('ethio_glow_final_db', JSON.stringify(userEvents));
            closeModal(); refreshUI();
        };

        window.deleteEvent = (id) => {
            userEvents = userEvents.filter(e => e.id !== id);
            localStorage.setItem('ethio_glow_final_db', JSON.stringify(userEvents));
            refreshUI();
        };

        window.onload = () => {
            refreshUI();
            if ("Notification" in window) Notification.requestPermission();
        };
        
        // Accurate countdown refresh
        setInterval(refreshUI, 30000); 
    </script>
</body>
</html>
